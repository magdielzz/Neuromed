document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

re Franklin',sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;\">NR<\u002Fspan>\n        <span style=\"width:32px;height:32px;border-radius:50%;border:2px solid #0D1B17;background:#2F5E7E;color:#fff;font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-9px;\">CM<\u002Fspan>\n        <span style=\"width:32px;height:32px;border-radius:50%;border:2px solid #0D1B17;background:#8A4227;color:#fff;font-family:'Libre Franklin',sans-serif;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:-9px;\">AC<\u002Fspan>\n      <\u002Fdiv>\n      +240 profesionales de salud ya en la plataforma\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:40px;\">\n    <div style=\"width:100%;max-width:520px;animation:fadeUp .5s ease;\">\n      <h2 style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:30px;letter-spacing:-.02em;margin:0 0 8px;\">Bienvenido a MediLink<\u002Fh2>\n      <p style=\"font-size:15px;color:#5F5E5A;margin:0 0 32px;\">¿Cómo vas a usar la plataforma? Elige tu tipo de cuenta para continuar.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <button sc-camel-on-click=\"{{ pickPatient }}\" style=\"text-align:left;background:#fff;border:1.5px solid #E2EAE6;border-radius:14px;padding:24px;cursor:pointer;display:flex;align-items:center;gap:18px;transition:all .2s;\" style-hover=\"border-color:#157A62;box-shadow:0 6px 18px rgba(20,30,26,.10);transform:translateY(-2px);\">\n          <span style=\"width:52px;height:52px;border-radius:14px;background:#E9F1EE;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n            <svg width=\"26\" height=\"26\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#0E5C4A\" stroke-width=\"2\"><path d=\"M20 21v-2a4 4 0 0 0-  -->\n<sc-if value=\"{{ isRegPatient }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"min-height:100vh;background:#F7FAF8;padding:32px 24px 64px;\">\n  <div style=\"max-width:720px;margin:0 auto;animation:fadeUp .5s ease;\">\n    <div sc-camel-on-click=\"{{ goUserType }}\" style=\"display:flex;align-items:center;gap:10px;font-family:'Libre Franklin',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.03em;cursor:pointer;margin-bottom:32px;\">\n      <span style=\"width:10px;height:10px;border-radius:50%;background:#157A62;box-shadow:0 0 0 3px #E9F1EE;\"><\u002Fspan>MediLink\n    <\u002Fdiv>\n    <div style=\"display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#0E5C4A;background:#E9F1EE;padding:5px 12px;border-radius:9999px;margin-bottom:16px;\">Cuenta de paciente<\u002Fdiv>\n    <h1 style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:32px;letter-spacing:-.02em;margin:0 0 8px;\">Crea tu expediente<\u002Fh1>\n    <p style=\"font-size:15px;color:#5F5E5A;margin:0 0 32px;max-width:520px;\">Estos datos forman la base de tu expediente médico digital. Solo tú y los médicos que autorices podrán verlos.<\u002Fp>\n\n    <div style=\"background:#fff;border:1px solid #E2EAE6;border-radius:14px;padding:32px;\">\n      <div style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:15px;color:#0D1B17;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid #EEF3F1;\">Datos personales<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 18px;\">\n        <div style=\"grid-column:1/3;\"><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Nombre completo<\u002Flabel><input placeholder=\"Nombre y apellidos\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;m D1B17;margin:28px 0 8px;padding-bottom:12px;border-bottom:1px solid #EEF3F1;\">Mis seguros médicos<\u002Fdiv>\n      <p style=\"font-size:12.5px;color:#888780;margin:0 0 14px;\">Selecciona los seguros que posees. Los usados para filtrar médicos que los aceptan.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px;\">\n        <sc-for list=\"{{ insPatient }}\" as=\"i\" hint-placeholder-count=\"8\"><button sc-camel-on-click=\"{{ i.onToggle }}\" style=\"{{ i.style }}\">{{ i.name }}<\u002Fbutton><\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:15px;color:#0D1B17;margin:28px 0 18px;padding-bottom:12px;border-bottom:1px solid #EEF3F1;\">Seguridad<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 18px;\">\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Contraseña<\u002Flabel><input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Confirmar contraseña<\u002Flabel><input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:28px;\">\n        <button sc-camel-on-click=\"{{ doLogin }}\" style=\"flex:1;padding:15px;background:#157A62;color:#fff;border:none;border-radius:12px;font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 1px 2px rgba(20,30,26,.12);transition:all .2s;\" style-hover=\"background:#0E5C4A;transform:translateY(-1px);\">Crear cuenta y continuar<\u002Fbutton>\n        <a sc-camel-on-click=\"{{ goLogin margin-bottom:6px;\">Subespecialidad<\u002Flabel><input placeholder=\"ej. Neurología vascular\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Cédula profesional<\u002Flabel><input placeholder=\"0000000\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Universidad<\u002Flabel><input placeholder=\"ej. UNAM\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Años de experiencia<\u002Flabel><input type=\"number\" placeholder=\"00\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Idiomas<\u002Flabel><input placeholder=\"Español, Inglés\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div style=\"grid-column:1/3;\"><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Hospitales donde atiendes<\u002Flabel><input placeholder=\"Hospital Ángeles, Médica Sur…\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:15px;color:#0D1B17;margin:28px 0 18px;padding-bottom:12px;border-bottom:1px solid #EEF3F1;\">Consulta<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px 18px;\">\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Precio por consulta<\u002Flabel><input type=\"number\" placeholder=\"$ MXN\" style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;\"><\u002Fdiv>\n        <div><label style=\"display:block;font-size:13px;font-weight:600;color:#2A3D35;margin-bottom:6px;\">Duración de consulta<\u002Flabel><sc-raw-select style=\"width:100%;padding:12px 14px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:11px;font-size:14px;color:#5F5E5A;\"><option>30 min<\u002Foption><option>45 min<\u002Foption><option>60 min<\u002Foption><\u002Fsc-raw-select><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:15px;color:#0D1B17;margin:28px 0 8px;padding-bottom:12px;border-bottom:1px solid #EEF3F1;\">Seguros que acepto<\u002Fdiv>\n      <p style=\"font-size:12.5px;color:#888780;margin:0 0 14px;\">Selecciona los seguros con los que trabajas. Aparecerás en las búsquedas filtradas por ellos.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px;\">\n        <sc-for list=\"{{ insDoctor }}\" as=\"i\" hint-placeholder-count=\"8\"><button sc-camel-on-click=\"{{ i.onToggle }}\" style=\"{{ i.style }}\">{{ i.name }}<\u002Fbutton><\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:28px;\">\n        <button sc-camel-on-click=\"{{ doLogin }}\" style=\"flex:1;padding:15px;background:#157A62;color:#fff;border:none;border-radius:12px;font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 1px 2px rgba(20,30,26,.12);transition:all .2s;\" style-hover=\"background:#0E5C4A;transform:translateY(-1px);\">Enviar para verificación<\u002Fbutton>\n        <a sc-camel-on-click=\"{{ goLogin }}\" style=\"font-size:13px;color:#888780;cursor:pointer;\">Ya tengo cuenta<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══════════ BUSCADOR INTELIGENTE ══════════ -->\n<sc-if value=\"{{ isSearch }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"max-width:820px;margin:0 auto;padding:64px 32px 80px;animation:fadeUp .4s ease;\">\n  <div style=\"text-align:center;margin-bottom:36px;\">\n    <div style=\"display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#3E5468;background:#EDF1F5;border:1px solid rgba(62,84,104,.2);padding:6px 13px;border-radius:9999px;margin-bottom:18px;\">\n      <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#3E5468\" stroke-width=\"2\"><path d=\"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\"><\u002Fpath><\u002Fsvg>Orientación por IA · nunca diagnóstico\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:38px;letter-spacing:-.025em;margin:0 0 12px;line-height:1.12;\">¿Qué te está pasando?<\u002Fh1>\n    <p style=\"font-size:16px;color:#5F5E5A;margin:0 auto;max-width:520px;\">Descríbelo con tus palabras. Te orientamos hacia el especialista correcto — la decisión clínica siempre la toma un médico.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"background:#fff;border:1px solid #E2EAE6;border-radius:14px;box-shadow:0 1px 3px rgba(20,30,26,.06);padding:22px;\">\n    <textarea placeholder=\"ej. Tengo un dolor de cabeza muy fuerte desde hace tres días, con mareos y me molesta la luz…\" style=\"width:100%;min-height:96px;padding:14px 16px;background:#F7FAF8;border:1.5px solid #E2EAE6;border-radius:14px;font-size:15px;line-height:1.6;resize:vertical;\">Tengo un dolor de cabeza muy fuerte desde hace tres días, con mareos y me molesta mucho la luz.<\u002Ftextarea>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:12px;\">\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n        <span style=\"font-size:12px;color:#888780;align-self:center;\">Ejemplos:<\u002Fspan>\n        <span style=\"font-size:12.5px;color:#5F5E5A;background:#EEF3F1;padding:5px 11px;border-radius:9999px;cursor:pointer;\">Dolor de pecho<\u002Fspan>\n        <span style=\"font-size:12.5px;color:#5F5E5A;background:#EEF3F1;padding:5px 11px;border-radius:9999px;cursor:pointer;\">Mucha ansiedad<\u002Fspan>\n        <span style=\"font-size:12.5px;color:#5F5E5A;background:#EEF3F1;padding:5px 11px;border-radius:9999px;cursor:pointer;\">Mi hijo tiene fiebre<\u002Fspan>\n      <\u002Fdiv>\n      <button sc-camel-on-click=\"{{ analyze }}\" style=\"display:inline-flex;align-items:center;gap:8px;padding:12px 22px;background:#157A62;color:#fff;border:none;border-radius:9999px;font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 1px 2px rgba(20,30,26,.12);transition:all .2s;\" style-hover=\"background:#0E5C4A;transform:translateY(-1px);\">\n        Analizar síntomas\n        <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ analyzed }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"margin-top:24px;animation:fadeUp .4s ease;\">\n    <div style=\"background:#fff;border:1px solid #E2EAE6;border-radius:14px;padding:26px;\">\n      <div style=\"display:flex;align-items:flex-start;gap:14px;margin-bottom:22px;\">\n        <span style=\"width:38px;height:38px;border-radius:10px;background:#3E5468;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\"><path d=\"M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l
